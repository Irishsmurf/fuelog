<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Fuelog">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="48%" r="55%">
      <stop offset="0%" stop-color="#1A1F2E"/>
      <stop offset="100%" stop-color="#0A0F1E"/>
    </radialGradient>
    <filter id="needle-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background: petroleum rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg-glow)"/>

  <!-- Subtle inner ring for depth -->
  <rect x="8" y="8" width="496" height="496" rx="106"
        fill="none" stroke="#1E2D40" stroke-width="1" opacity="0.6"/>

  <!-- ── GAUGE ── -->

  <!-- Track (full arc, E → F, 200° to 340°, 140° CW) -->
  <path d="M 106 220 A 160 160 0 0 1 406 220"
        fill="none" stroke="#1A2744" stroke-width="26" stroke-linecap="round"/>

  <!-- Active fill arc (E → ¾, 200° to 305°, 105° CW) -->
  <path d="M 106 220 A 160 160 0 0 1 348 144"
        fill="none" stroke="#F59E0B" stroke-width="26" stroke-linecap="round"/>

  <!-- Glow layer on active arc -->
  <path d="M 106 220 A 160 160 0 0 1 348 144"
        fill="none" stroke="#FBBF24" stroke-width="4" stroke-linecap="round" opacity="0.5"/>

  <!-- ── TICK MARKS ── -->
  <!-- E (200°) -->
  <line x1="106" y1="220" x2="126" y2="228" stroke="#334155" stroke-width="5" stroke-linecap="round"/>
  <!-- 235° -->
  <line x1="164" y1="144" x2="177" y2="162" stroke="#334155" stroke-width="5" stroke-linecap="round"/>
  <!-- Top (270°) — midpoint marker, slightly brighter -->
  <line x1="256" y1="115" x2="256" y2="137" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
  <!-- 305° — 3/4 marker, amber (aligns with needle) -->
  <line x1="348" y1="144" x2="335" y2="162" stroke="#F59E0B" stroke-width="7" stroke-linecap="round"/>
  <!-- F (340°) — full mark, amber -->
  <line x1="406" y1="220" x2="386" y2="228" stroke="#D97706" stroke-width="5" stroke-linecap="round"/>

  <!-- ── NEEDLE ── -->
  <!-- Shadow for depth -->
  <line x1="256" y1="275" x2="336" y2="160"
        filter="url(#needle-blur)"
        stroke="#000000" stroke-width="12" stroke-linecap="round" opacity="0.5"/>
  <!-- Needle body -->
  <line x1="256" y1="275" x2="336" y2="160"
        stroke="#F1F5F9" stroke-width="7" stroke-linecap="round"/>
  <!-- Needle counterweight (small line opposite direction) -->
  <line x1="256" y1="275" x2="240" y2="299"
        stroke="#F1F5F9" stroke-width="7" stroke-linecap="round" opacity="0.4"/>

  <!-- Center hub -->
  <circle cx="256" cy="275" r="20" fill="#F59E0B"/>
  <circle cx="256" cy="275" r="10" fill="#0A0F1E"/>
  <circle cx="256" cy="275" r="4"  fill="#FBBF24"/>

  <!-- ── LABELS ── -->
  <!-- E label -->
  <text x="80" y="248" font-size="24" font-weight="700" fill="#475569"
        text-anchor="middle" font-family="Space Grotesk, system-ui, sans-serif">E</text>
  <!-- F label -->
  <text x="432" y="248" font-size="24" font-weight="700" fill="#F59E0B"
        text-anchor="middle" font-family="Space Grotesk, system-ui, sans-serif">F</text>

  <!-- ── WORDMARK ── -->
  <text x="256" y="442"
        font-size="76" font-weight="700" text-anchor="middle"
        font-family="Space Grotesk, system-ui, sans-serif"
        letter-spacing="-3">
    <tspan fill="#F59E0B">fuel</tspan><tspan fill="#475569">og</tspan>
  </text>

  <!-- Subtle amber rule above wordmark -->
  <line x1="160" y1="398" x2="352" y2="398" stroke="#F59E0B" stroke-width="1" opacity="0.25"/>
</svg>
