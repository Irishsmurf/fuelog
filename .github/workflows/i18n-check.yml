name: i18n Check

on:
  pull_request:
    paths:
      - 'src/**/*.tsx'
      - 'src/**/*.ts'
      - 'src/i18n/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  i18n-check:
    name: Check i18n compliance
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Check translation key parity (All Locales)
        run: |
          node - <<'EOF'
          import fs from 'fs';
          import path from 'path';

          const localesDir = 'src/i18n/locales';
          const files = fs.readdirSync(localesDir).filter(f => f.endsWith('.json'));
          
          const baseFile = 'en.json';
          const baseData = JSON.parse(fs.readFileSync(path.join(localesDir, baseFile), 'utf8'));

          function getKeys(obj, prefix = '') {
            return Object.entries(obj).flatMap(([k, v]) => {
              const fullKey = prefix ? `${prefix}.${k}` : k;
              return typeof v === 'object' && v !== null && !Array.isArray(v)
                ? getKeys(v, fullKey)
                : [fullKey];
            });
          }

          const baseKeys = new Set(getKeys(baseData));
          let failed = false;

          files.forEach(file => {
            if (file === baseFile) return;
            
            console.log(`Checking ${file} against ${baseFile}...`);
            const targetData = JSON.parse(fs.readFileSync(path.join(localesDir, file), 'utf8'));
            const targetKeys = new Set(getKeys(targetData));

            const missingInTarget = [...baseKeys].filter(k => !targetKeys.has(k));
            const extraInTarget = [...targetKeys].filter(k => !baseKeys.has(k));

            if (missingInTarget.length > 0) {
              console.error(`  - Keys in ${baseFile} missing from ${file}:`);
              missingInTarget.forEach(k => console.error(`    - ${k}`));
              failed = true;
            }

            if (extraInTarget.length > 0) {
              console.error(`  - Extra keys in ${file} not found in ${baseFile}:`);
              extraInTarget.forEach(k => console.error(`    - ${k}`));
              failed = true;
            }
          });

          if (failed) {
            console.error('\nAll locale files must have the exact same keys as en.json.');
            process.exit(1);
          }

          console.log(`Key parity check passed for ${files.length} locales. ${baseKeys.size} keys verified per file.`);
          EOF

      - name: Check for untranslated placeholder strings
        run: |
          node - <<'EOF'
          import fs from 'fs';
          import path from 'path';

          const localesDir = 'src/i18n/locales';
          const files = fs.readdirSync(localesDir).filter(f => f.endsWith('.json') && f !== 'en.json');
          const placeholderPattern = /^\[[a-z]{2}\]\s/;

          let failed = false;

          function findPlaceholders(obj, prefix = '') {
            const hits = [];
            for (const [k, v] of Object.entries(obj)) {
              const fullKey = prefix ? `${prefix}.${k}` : k;
              if (typeof v === 'object' && v !== null && !Array.isArray(v)) {
                hits.push(...findPlaceholders(v, fullKey));
              } else if (typeof v === 'string' && placeholderPattern.test(v)) {
                hits.push(`${fullKey}: "${v}"`);
              }
            }
            return hits;
          }

          files.forEach(file => {
            const data = JSON.parse(fs.readFileSync(path.join(localesDir, file), 'utf8'));
            const hits = findPlaceholders(data);
            if (hits.length > 0) {
              console.error(`Placeholder strings found in ${file}:`);
              hits.forEach(h => console.error(`    - ${h}`));
              failed = true;
            }
          });

          if (failed) {
            console.error('\nLocale files must not contain "[xx] " placeholder strings.');
            process.exit(1);
          }

          console.log(`No placeholder strings found in ${files.length} locale files.`);
          EOF

      - name: Check components/pages use useTranslation (not raw strings)
        run: |
          VIOLATIONS=0

          # Find TSX/TS files in components and pages (not test files or locale files)
          FILES=$(find src/components src/pages -name "*.tsx" -o -name "*.ts" | grep -v ".test.\|.spec.")

          for FILE in $FILES; do
            # Check if file has user-visible JSX content (renders to the DOM).
            # Runs regardless of whether the file already uses useTranslation/
            # withTranslation, since a file can be partially translated, and
            # class components can't use the hook at all but can still have
            # hardcoded text mixed with t() calls passed down as props.
            HAS_JSX_RETURN=$(grep -c "return (" "$FILE" 2>/dev/null || echo 0)

            if [ "$HAS_JSX_RETURN" -gt 0 ]; then
              # Hardcoded sentence-case string literal attributes/props (e.g. title="Sign Out")
              QUOTED=$(grep -nE '"[A-Z][a-zA-Z]{4,} [a-zA-Z ]{4,}"' "$FILE" 2>/dev/null | grep -v "//\|console\.\|t('\|t(\"" || true)
              # Hardcoded sentence-case JSX text nodes (e.g. >Install Fuelog<)
              JSX_TEXT=$(grep -nE '>[A-Z][a-zA-Z]{2,}( [a-zA-Z.,!]{2,})+<' "$FILE" 2>/dev/null | grep -v "{t(\|{i18n" || true)

              HARDCODED=$(printf '%s\n%s' "$QUOTED" "$JSX_TEXT" | grep -v '^$' || true)
              if [ -n "$HARDCODED" ]; then
                echo "WARNING: $FILE has hardcoded user-facing strings not wrapped with t():"
                echo "$HARDCODED"
                VIOLATIONS=$((VIOLATIONS + 1))
              fi
            fi
          done

          if [ $VIOLATIONS -gt 0 ]; then
            echo ""
            echo "$VIOLATIONS file(s) may have hardcoded strings not wrapped with t()."
            echo "Use t('key') for all user-visible text (via useTranslation, or withTranslation for class components)."
            exit 1
          fi

          echo "i18n string check passed."
