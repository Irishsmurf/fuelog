<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 560" role="img" aria-label="Fuelog — Track every fill-up">
  <defs>
    <!-- Petroleum background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D1424"/>
      <stop offset="100%" stop-color="#060B14"/>
    </linearGradient>

    <!-- Central amber glow -->
    <radialGradient id="glow" cx="50%" cy="46%" r="42%">
      <stop offset="0%"   stop-color="#F59E0B" stop-opacity="0.12"/>
      <stop offset="60%"  stop-color="#D97706" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0"/>
    </radialGradient>

    <!-- Horizontal separator gradient -->
    <linearGradient id="sep-h" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#F59E0B" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#F59E0B" stop-opacity="0.4"/>
      <stop offset="50%"  stop-color="#F59E0B" stop-opacity="0.7"/>
      <stop offset="75%"  stop-color="#F59E0B" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </linearGradient>

    <!-- Decorative arc gradient -->
    <linearGradient id="arc-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#F59E0B" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#F59E0B" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1440" height="560" fill="url(#bg)"/>

  <!-- Ambient amber glow -->
  <rect width="1440" height="560" fill="url(#glow)"/>

  <!-- ── BACKGROUND DECORATION: large ghost gauge arc ── -->
  <!-- Scaled-up version of the logomark arc, very faint, centered -->
  <!-- center (720, 820), r=560 — only upper portion visible in viewport -->
  <path d="M 223 537 A 560 560 0 0 1 1217 537"
        fill="none" stroke="#F59E0B" stroke-width="1" opacity="0.06" stroke-linecap="round"/>

  <!-- Second ghost arc, slightly smaller -->
  <path d="M 280 524 A 480 480 0 0 1 1160 524"
        fill="none" stroke="#F59E0B" stroke-width="1" opacity="0.04" stroke-linecap="round"/>

  <!-- Horizontal grid lines (dashboard feel) -->
  <line x1="0" y1="180" x2="1440" y2="180" stroke="#1E2D40" stroke-width="1" opacity="0.6"/>
  <line x1="0" y1="380" x2="1440" y2="380" stroke="#1E2D40" stroke-width="1" opacity="0.6"/>

  <!-- Vertical accent marks -->
  <line x1="240"  y1="0" x2="240"  y2="560" stroke="#1A2744" stroke-width="1" opacity="0.4"/>
  <line x1="1200" y1="0" x2="1200" y2="560" stroke="#1A2744" stroke-width="1" opacity="0.4"/>

  <!-- ── MAIN CONTENT ── -->

  <!-- Eyebrow: SPACE MONO label -->
  <text x="720" y="188"
        font-family="Space Mono, ui-monospace, monospace"
        font-size="12" font-weight="400" fill="#D97706"
        text-anchor="middle" letter-spacing="5" opacity="0.9">
    FUEL TRACKER
  </text>

  <!-- Top amber rule -->
  <rect x="620" y="198" width="200" height="1" fill="url(#sep-h)" opacity="0.6"/>

  <!-- Main wordmark -->
  <text x="720" y="330"
        font-family="Space Grotesk, system-ui, sans-serif"
        font-size="168" font-weight="700" text-anchor="middle"
        letter-spacing="-7">
    <tspan fill="#F59E0B">fuel</tspan><tspan fill="#475569">og</tspan>
  </text>

  <!-- Bottom amber rule -->
  <rect x="540" y="354" width="360" height="1" fill="url(#sep-h)" opacity="0.5"/>

  <!-- Tagline -->
  <text x="720" y="400"
        font-family="Space Mono, ui-monospace, monospace"
        font-size="14" font-weight="400" fill="#64748B"
        text-anchor="middle" letter-spacing="3">
    TRACK · ANALYSE · OPTIMISE
  </text>

  <!-- ── LEFT CLUSTER: key stats (decorative) ── -->
  <text x="220" y="266"
        font-family="Space Mono, ui-monospace, monospace"
        font-size="36" font-weight="700" fill="#F59E0B" text-anchor="middle" opacity="0.35">
    8.4
  </text>
  <text x="220" y="289"
        font-family="Space Mono, ui-monospace, monospace"
        font-size="10" fill="#475569" text-anchor="middle" letter-spacing="2" opacity="0.5">
    KM/L
  </text>

  <!-- ── RIGHT CLUSTER ── -->
  <text x="1220" y="266"
        font-family="Space Mono, ui-monospace, monospace"
        font-size="36" font-weight="700" fill="#F59E0B" text-anchor="middle" opacity="0.35">
    €74
  </text>
  <text x="1220" y="289"
        font-family="Space Mono, ui-monospace, monospace"
        font-size="10" fill="#475569" text-anchor="middle" letter-spacing="2" opacity="0.5">
    LAST FILL
  </text>

  <!-- ── BOTTOM BAR ── -->
  <rect x="0" y="530" width="1440" height="30" fill="#060B14" opacity="0.8"/>
  <text x="720" y="550"
        font-family="Space Mono, ui-monospace, monospace"
        font-size="10" fill="#334155" text-anchor="middle" letter-spacing="3">
    fuelog.paddez.com
  </text>
</svg>
